{% include base_path %}

<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png?v=M44lzPylqQ" sizes="32x32">
<link rel="shortcut icon" href="{{ base_path }}/images/favicon.ico?v=M44lzPylqQ">
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ site.title }}",
  "url": "{{ site.url }}{{ site.baseurl }}/",
  "description": {{ site.description | jsonify }}
}
</script>

{% if page.url == "/" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "{{ site.author.name }}",
  "jobTitle": "Research Scientist",
  "url": "{{ site.url }}{{ site.baseurl }}/",
  "affiliation": {
    "@type": "Organization",
    "name": "ByteDance"
  },
  "sameAs": [
    "{{ site.author.googlescholar }}",
    "https://www.linkedin.com/in/{{ site.author.linkedin }}/",
    "https://github.com/{{ site.author.github }}"
  ]
}
</script>
{% endif %}

{% if page.url == "/publications/" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CollectionPage",
  "name": "Publications",
  "url": "{{ site.url }}{{ site.baseurl }}/publications/",
  "description": "Peer-reviewed research publications by Hao Zhang."
}
</script>
{% endif %}

{% if page.url == "/systems/" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CollectionPage",
  "name": "Systems & Projects",
  "url": "{{ site.url }}{{ site.baseurl }}/systems/",
  "description": "Selected Data+AI systems and research projects."
}
</script>
{% endif %}
